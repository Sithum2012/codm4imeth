<title>Name Check</title>

<style>

    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.page{
    display:none;
    min-height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#page1{
    display:flex;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
    text-align:center;
}

input{
    padding:10px;
    width:250px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
}

#error{
    color:red;
    margin-top:10px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
    width:90%;
}

.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    background:#ddd;
}

.logo{
    max-width:300px;
    margin:20px;
}
</style>

<script>
function checkName() {
    const name = document
        .getElementById("nameInput")
        .value
        .trim()
        .toLowerCase();

    if (name === "imeth" || name === "savithu") {
        document.getElementById("page1").style.display = "none";
        document.getElementById("page2").style.display = "flex";
    } else {
        document.getElementById("error").textContent =
            "Access denied. Incorrect name.";
    }
}
</script>
